services:
  # Frontend - Static Site
  - type: web
    name: ai-resume-analyzer-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://ai-resume-analyzer-backend.onrender.com

  # Backend - Node.js API
  - type: web
    name: ai-resume-analyzer-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_SERVICE_URL
        value: https://ai-resume-analyzer-ai.onrender.com
      - key: PORT
        value: 5000

  # AI Service - Python FastAPI
  - type: web
    name: ai-resume-analyzer-ai
    runtime: python
    buildCommand: cd ai-service && pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: cd ai-service && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
